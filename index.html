<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/janyaa-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The public dashboard lists club members (mostly minors). Keep it reachable
         by anyone with the link, but out of search engines / scrapers. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Janyaa BCP Hub</title>
    <script>
      // Set the theme before paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var t = localStorage.getItem('janyaa-theme') || 'system'
          var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.setAttribute('data-theme', 'dark')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:ital,wght@0,400..800;1,400..600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
